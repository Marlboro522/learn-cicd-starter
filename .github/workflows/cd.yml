name: ci

on:
  push:
    branches: [main]

jobs:
    Deploy:
         name: Deploy
         runs-on: ubunutu-latest

         steps:
            - name: checkout
              uses: actions/checkout@v6
            
            - name: set up go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.0"

            - name: build notely
              run: ./scripts/buildprod.sh
            
          