name: ci

on:
  push:
    branches: [main]

jobs:
    Deploy:
         name: Deploy
         runs-on: ubuntu-latest

         steps:
            - name: checkout
              uses: actions/checkout@v6
            
            - name: set up go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.26.0"

            - name: set up goose
              run: go install github.com/pressly/goose/v3/cmd/goose@latest

            - name: build notely
              run: ./scripts/buildprod.sh
            
            - name: auth
              uses: google-github-actions/auth@v2
              with:
                  credentials_json: '${{secrets.GCP_CREDENTIALS}}'
            - name: setup-gcloud
              uses: google-github-actions/setup-gcloud@v3
              with:
                  version: '>=363.0.0'

            - name: gcloud cli
              run: 'gcloud info'

            - name: Build Docker Image
              run: gcloud builds submit --tag us-central1-docker.pkg.dev/notely-503115/notely-ar-repo/notely:latest .

            - name: run migrations
              run: ./scripts/migrateup.sh
            - name: Deploy to Cloud Run
              run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-503115/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-503115 --max-instances 4
          
         env:
           DATABASE_URL: ${{secrets.DATABASE_URL}}

          